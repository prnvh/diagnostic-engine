<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Knee Session Ledger | Diagnostic Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-veil" aria-hidden="true"></div>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="/knee/">
          <span class="brand-mark" aria-hidden="true">DE</span>
          <span>Knee Workspace</span>
        </a>
        <div class="scope-badge">Session ledger</div>
      </header>

      <main>
        <section class="surface" style="padding: 1.35rem">
          <div class="panel-head">
            <div>
              <p class="mini-label">Ledger viewer</p>
              <h3>Session event ledger</h3>
            </div>
          </div>
          <form id="ledger-form" class="entry-form" style="margin-top: 0.8rem">
            <label class="field">
              <span>Session ID</span>
              <input id="session-id-input" type="text" placeholder="Paste sessionId" required />
            </label>
            <div class="hero-actions">
              <button class="button primary" type="submit">Load ledger</button>
              <a class="button secondary" href="/knee/">Back to workspace</a>
            </div>
          </form>
          <div class="status-banner" id="status-banner" hidden></div>
          <div id="ledger-output" class="ledger-list empty-state" style="margin-top: 1rem">Ledger not loaded.</div>
        </section>
      </main>
    </div>
    <script src="/knee-ledger.js" defer></script>
  </body>
</html>
